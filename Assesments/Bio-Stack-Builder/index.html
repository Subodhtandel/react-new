<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Stack Builder | Your Link-in-Bio Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <header class="header">
            <div class="header-content">
                <h1>Bio-Stack Builder</h1>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Add Link Section -->
            <section class="add-link-section">
                <h2>Add Your Link</h2>
                <form id="linkForm" class="link-form">
                    <div class="form-group">
                        <label for="linkTitle">Link Title</label>
                        <input 
                            type="text" 
                            id="linkTitle" 
                            placeholder="e.g., My YouTube Channel" 
                            required
                        >
                        <span class="error-message" id="titleError"></span>
                    </div>

                    <div class="form-group">
                        <label for="linkURL">Link URL</label>
                        <input 
                            type="url" 
                            id="linkURL" 
                            placeholder="e.g., https://youtube.com/@yourhandle" 
                            required
                        >
                        <span class="error-message" id="urlError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">Add Link</button>
                </form>
            </section>

            <!-- Profile Preview Section -->
            <section class="profile-section">
                <h2>Your Profile Links</h2>
                <div class="links-container" id="linksContainer">
                    <p class="empty-state">No links added yet. Start building your bio stack!</p>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-card">
                    <span class="stat-label">Total Links</span>
                    <span class="stat-value" id="linkCount">0</span>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 Bio-Stack Builder. Built with vanilla JavaScript.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
